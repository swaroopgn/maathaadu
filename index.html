<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#fdf8f0">
<title>ಮಾತಾಡು! Maathaadu! — speak Kannada</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='52' r='44' fill='%2358cc7a'/%3E%3Ccircle cx='38' cy='44' r='13' fill='%23fff'/%3E%3Ccircle cx='41' cy='46' r='6' fill='%232e2a5e'/%3E%3Ccircle cx='62' cy='44' r='13' fill='%23fff'/%3E%3Ccircle cx='59' cy='46' r='6' fill='%232e2a5e'/%3E%3Cpath d='M42 62 C42 57 58 57 58 62 C58 70 52 75 50 75 C48 75 42 70 42 62Z' fill='%23ffa62b'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+Tamma+2:wght@500;700;800&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- ======================= HOME ======================= -->
<section id="screen-home" class="screen active">
  <div class="wrap">
    <header class="masthead">
      <span class="float-emoji fe1">🦜</span>
      <span class="float-emoji fe2">✨</span>
      <span class="float-emoji fe3">🥭</span>
      <h1 class="kn-title">ಮಾತಾಡು!</h1>
      <div class="en-title">maathaadu! · speak!</div>
      <p class="tagline">Listen to the parrot 🦜 and answer in Kannada</p>
    </header>

    <div class="players" id="players">
      <button class="player" data-player="anna" aria-label="Play as Anna, listen and type">
        <span class="avatar">😎</span>
        <span class="pname">ಅಣ್ಣ Anna</span>
        <span class="pmode">listen &amp; type ⌨️</span>
      </button>
      <button class="player" data-player="putta" aria-label="Play as Putta, listen and tap">
        <span class="avatar">🦖</span>
        <span class="pname">ಪುಟ್ಟ Putta</span>
        <span class="pmode">listen &amp; tap 👆</span>
      </button>
    </div>

    <h2 class="shelf-title">PICK A GAME</h2>
    <div class="lessons" id="lessons"></div>
  </div>
</section>

<!-- ======================= LESSON ======================= -->
<section id="screen-lesson" class="screen">
  <div class="wrap">
    <div class="lesson-top">
      <button class="backbtn" id="btn-back" aria-label="Back to shelf">←</button>
      <div class="lesson-name" id="lesson-name"></div>
      <button class="mode-toggle" id="btn-mode" aria-label="Switch answer mode">⌨️</button>
    </div>

    <div class="progress-wrap" aria-hidden="true">
      <div class="progress" id="progress"></div>
      <div class="pcount" id="pcount"></div>
    </div>

    <div class="stage">
      <button class="parrot-btn" id="btn-parrot" aria-label="Play the Kannada word">
        <svg viewBox="0 0 200 200" aria-hidden="true">
          <!-- kawaii parrot, flat candy style -->
          <ellipse cx="100" cy="188" rx="46" ry="8" fill="rgba(46,42,94,.08)"/>
          <!-- head tuft -->
          <ellipse cx="78" cy="30" rx="9" ry="15" fill="#ff6b6b" transform="rotate(-24 78 30)"/>
          <ellipse cx="97" cy="24" rx="9" ry="16" fill="#ffc93c"/>
          <ellipse cx="116" cy="30" rx="9" ry="15" fill="#9b5de5" transform="rotate(24 116 30)"/>
          <!-- tail -->
          <ellipse cx="52" cy="150" rx="14" ry="34" fill="#4cc9f0" transform="rotate(28 52 150)"/>
          <!-- body -->
          <path d="M100 32 C 58 32 42 74 44 116 C 46 156 68 182 100 182 C 132 182 154 156 156 116 C 158 74 142 32 100 32 Z" fill="#58cc7a"/>
          <!-- belly -->
          <ellipse cx="100" cy="134" rx="38" ry="42" fill="#c9f2d0"/>
          <!-- wing -->
          <ellipse cx="60" cy="112" rx="17" ry="30" fill="#3fae62" transform="rotate(12 60 112)"/>
          <!-- eyes: big kawaii -->
          <circle cx="82" cy="76" r="15" fill="#fff"/>
          <circle cx="85" cy="78" r="7.5" fill="#2e2a5e"/>
          <circle cx="88" cy="75" r="2.6" fill="#fff"/>
          <circle cx="126" cy="76" r="15" fill="#fff"/>
          <circle cx="123" cy="78" r="7.5" fill="#2e2a5e"/>
          <circle cx="126" cy="75" r="2.6" fill="#fff"/>
          <!-- blush -->
          <circle cx="68" cy="96" r="6" fill="#ffb0c8" opacity=".8"/>
          <circle cx="140" cy="96" r="6" fill="#ffb0c8" opacity=".8"/>
          <!-- beak -->
          <path d="M92 90 C 92 84 116 84 116 90 C 116 100 108 108 104 108 C 100 108 92 100 92 90 Z" fill="#ffa62b"/>
          <!-- feet -->
          <ellipse cx="86" cy="182" rx="10" ry="5" fill="#ffa62b"/>
          <ellipse cx="114" cy="182" rx="10" ry="5" fill="#ffa62b"/>
        </svg>
      </button>
      <div class="hint-listen" id="listen-hint">tap the parrot to hear it 🔊</div>
      <div class="audio-row">
        <button class="toybtn turq small" id="btn-again">🔊 again</button>
        <button class="toybtn ivory small" id="btn-slow">🐢 slow</button>
        <button class="toybtn yellow small" id="btn-hint">💡 hint</button>
      </div>
    </div>

    <div class="answer-area" id="answer-area">
      <div class="type-row" id="type-row">
        <input class="answer-input" id="answer-input" type="text"
               autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
               placeholder="type what you hear…" aria-label="Type the Kannada word in English letters">
        <button class="toybtn green" id="btn-check">Check ✓</button>
      </div>
      <div class="choices" id="choices"></div>
      <div class="feedback" id="feedback" role="status"></div>
      <div id="reveal-slot"></div>
    </div>
  </div>
</section>

<!-- ======================= COMPLETE ======================= -->
<section id="screen-complete" class="screen">
  <div class="wrap complete-stage">
    <div class="done-burst">🦜🎉</div>
    <h2 id="done-title">ಭೇಷ್! Bhesh!</h2>
    <div class="done-sub" id="done-sub"></div>
    <div class="done-stars" id="done-stars"></div>
    <div class="complete-actions">
      <button class="toybtn turq" id="btn-replay">🔁 play again</button>
      <button class="toybtn yellow" id="btn-home">🏠 toy shelf</button>
    </div>
  </div>
</section>

<div class="confetti" id="confetti"></div>

<script src="js/lessons.js"></script>
<script src="js/app.js"></script>
</body>
</html>
