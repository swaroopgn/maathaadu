<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0e2e34">
<title>ಮಾತಾಡು! Maathaadu! — speak Kannada</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='46' fill='%234fb35b'/%3E%3Ccircle cx='50' cy='42' r='24' fill='%23e8482f'/%3E%3Ccircle cx='58' cy='38' r='5' fill='%23fff'/%3E%3Cpath d='M70 44 L88 50 L70 56 Z' fill='%23ffb627'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+Tamma+2:wght@500;700;800&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- ======================= HOME ======================= -->
<section id="screen-home" class="screen active">
  <div class="wrap">
    <header class="masthead">
      <h1 class="kn-title">ಮಾತಾಡು!</h1>
      <div class="en-title">maathaadu! · speak!</div>
      <p class="tagline">Listen to the parrot 🦜 and answer in Kannada</p>
    </header>

    <div class="players" id="players">
      <button class="player" data-player="anna" aria-label="Play as Anna, listen and type">
        <svg class="doll" viewBox="0 0 74 92" aria-hidden="true">
          <ellipse cx="37" cy="86" rx="26" ry="6" fill="#a86a34"/>
          <rect x="17" y="42" width="40" height="42" rx="18" fill="#33bfb0"/>
          <rect x="17" y="56" width="40" height="9" fill="#ffb627"/>
          <rect x="17" y="70" width="40" height="9" fill="#e8482f"/>
          <circle cx="37" cy="26" r="19" fill="#fff3dc"/>
          <path d="M18 22 a19 19 0 0 1 38 0 l0 -2 a19 12 0 0 0 -38 0 Z" fill="#2b1c10"/>
          <circle cx="30" cy="27" r="2.6" fill="#2b1c10"/>
          <circle cx="44" cy="27" r="2.6" fill="#2b1c10"/>
          <path d="M31 34 q6 5 12 0" stroke="#c73f77" stroke-width="2.5" fill="none" stroke-linecap="round"/>
        </svg>
        <span class="pname">ಅಣ್ಣ Anna</span>
        <span class="pmode">listen &amp; type</span>
      </button>
      <button class="player" data-player="putta" aria-label="Play as Putta, listen and tap">
        <svg class="doll" viewBox="0 0 74 92" aria-hidden="true">
          <ellipse cx="37" cy="86" rx="26" ry="6" fill="#a86a34"/>
          <rect x="19" y="46" width="36" height="38" rx="17" fill="#f0679e"/>
          <rect x="19" y="58" width="36" height="8" fill="#4fb35b"/>
          <rect x="19" y="70" width="36" height="8" fill="#ffb627"/>
          <circle cx="37" cy="29" r="17" fill="#fff3dc"/>
          <path d="M20 25 a17 17 0 0 1 34 0 l0 -2 a17 10 0 0 0 -34 0 Z" fill="#2b1c10"/>
          <circle cx="37" cy="9" r="5" fill="#e8482f"/>
          <circle cx="31" cy="30" r="2.4" fill="#2b1c10"/>
          <circle cx="43" cy="30" r="2.4" fill="#2b1c10"/>
          <path d="M31 36 q6 5 12 0" stroke="#c73f77" stroke-width="2.5" fill="none" stroke-linecap="round"/>
        </svg>
        <span class="pname">ಪುಟ್ಟ Putta</span>
        <span class="pmode">listen &amp; tap</span>
      </button>
    </div>

    <h2 class="shelf-title">— pick a toy from the shelf —</h2>
    <div class="shelves" id="shelves"></div>
  </div>
</section>

<!-- ======================= LESSON ======================= -->
<section id="screen-lesson" class="screen">
  <div class="wrap">
    <div class="lesson-top">
      <button class="backbtn" id="btn-back" aria-label="Back to shelf">←</button>
      <div class="lesson-name" id="lesson-name"></div>
      <button class="mode-toggle" id="btn-mode" aria-label="Switch answer mode">⌨️</button>
    </div>

    <div class="peg-wrap" aria-hidden="true">
      <svg id="peg" viewBox="0 0 160 120"></svg>
    </div>

    <div class="stage">
      <button class="parrot-btn" id="btn-parrot" aria-label="Play the Kannada word">
        <svg viewBox="0 0 200 190" aria-hidden="true">
          <!-- Channapatna-style lacquered parrot -->
          <ellipse cx="100" cy="176" rx="56" ry="10" fill="rgba(0,0,0,.3)"/>
          <rect x="56" y="150" width="88" height="20" rx="10" fill="#a86a34"/>
          <rect x="64" y="142" width="72" height="14" rx="7" fill="#d99a5b"/>
          <path d="M100 30 C 60 30 44 70 48 108 C 51 138 72 156 100 156 C 128 156 149 138 152 108 C 156 70 140 30 100 30 Z" fill="#4fb35b"/>
          <path d="M52 96 C 66 88 134 88 148 96 L 148 108 C 134 100 66 100 52 108 Z" fill="#ffb627"/>
          <path d="M60 124 C 76 116 124 116 140 124 L 139 134 C 124 127 76 127 61 134 Z" fill="#e8482f"/>
          <circle cx="100" cy="56" r="34" fill="#4fb35b"/>
          <circle cx="100" cy="56" r="34" fill="url(#gloss)" opacity=".35"/>
          <circle cx="108" cy="48" r="6.5" fill="#fff3dc"/>
          <circle cx="110" cy="48" r="3.2" fill="#2b1c10"/>
          <path d="M124 46 C 152 40 168 52 162 66 C 150 76 130 66 122 58 Z" fill="#e8482f"/>
          <path d="M126 60 C 146 66 154 72 149 80 C 138 84 126 72 122 64 Z" fill="#ffb627"/>
          <path d="M64 90 C 46 108 46 132 58 142 C 70 146 78 134 76 118 Z" fill="#33bfb0"/>
          <circle cx="100" cy="20" r="8" fill="#e8482f"/>
          <rect x="97" y="24" width="6" height="12" rx="3" fill="#a86a34"/>
          <defs>
            <radialGradient id="gloss" cx=".35" cy=".25" r=".8">
              <stop offset="0" stop-color="#fff"/>
              <stop offset="1" stop-color="#fff" stop-opacity="0"/>
            </radialGradient>
          </defs>
        </svg>
      </button>
      <div class="hint-listen" id="listen-hint">tap the parrot to hear it 🔊</div>
      <div class="audio-row">
        <button class="toybtn turq small" id="btn-again">🔊 again</button>
        <button class="toybtn ivory small" id="btn-slow">🐢 slow</button>
        <button class="toybtn yellow small" id="btn-hint">💡 hint</button>
      </div>
    </div>

    <div class="answer-area" id="answer-area">
      <div class="type-row" id="type-row">
        <input class="answer-input" id="answer-input" type="text"
               autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
               placeholder="type what you hear…" aria-label="Type the Kannada word in English letters">
        <button class="toybtn green" id="btn-check">Check ✓</button>
      </div>
      <div class="choices" id="choices"></div>
      <div class="feedback" id="feedback" role="status"></div>
      <div id="reveal-slot"></div>
    </div>
  </div>
</section>

<!-- ======================= COMPLETE ======================= -->
<section id="screen-complete" class="screen">
  <div class="wrap complete-stage">
    <div class="done-doll">
      <svg viewBox="0 0 160 220" aria-hidden="true">
        <ellipse cx="80" cy="210" rx="52" ry="9" fill="rgba(0,0,0,.3)"/>
        <rect x="40" y="192" width="80" height="18" rx="9" fill="#a86a34"/>
        <ellipse cx="80" cy="182" rx="52" ry="16" fill="#e8482f"/>
        <ellipse cx="80" cy="158" rx="46" ry="15" fill="#ffb627"/>
        <ellipse cx="80" cy="136" rx="40" ry="14" fill="#4fb35b"/>
        <ellipse cx="80" cy="116" rx="34" ry="13" fill="#33bfb0"/>
        <ellipse cx="80" cy="98"  rx="28" ry="12" fill="#f0679e"/>
        <circle cx="80" cy="62" r="30" fill="#fff3dc"/>
        <path d="M50 56 a30 30 0 0 1 60 0 l0 -4 a30 18 0 0 0 -60 0 Z" fill="#2b1c10"/>
        <circle cx="80" cy="26" r="7" fill="#e8482f"/>
        <circle cx="69" cy="63" r="3.4" fill="#2b1c10"/>
        <circle cx="91" cy="63" r="3.4" fill="#2b1c10"/>
        <path d="M70 74 q10 8 20 0" stroke="#c73f77" stroke-width="3" fill="none" stroke-linecap="round"/>
        <circle cx="61" cy="70" r="4" fill="#f0679e" opacity=".6"/>
        <circle cx="99" cy="70" r="4" fill="#f0679e" opacity=".6"/>
      </svg>
    </div>
    <h2 id="done-title">ಭೇಷ್! Bhesh!</h2>
    <div class="done-sub" id="done-sub"></div>
    <div class="done-stars" id="done-stars"></div>
    <div class="complete-actions">
      <button class="toybtn turq" id="btn-replay">🔁 play again</button>
      <button class="toybtn yellow" id="btn-home">🏠 toy shelf</button>
    </div>
  </div>
</section>

<div class="confetti" id="confetti"></div>

<script src="js/lessons.js"></script>
<script src="js/app.js"></script>
</body>
</html>
